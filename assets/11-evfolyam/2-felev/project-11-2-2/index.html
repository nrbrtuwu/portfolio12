    <script>
      const bakedData = JSON.parse(document.getElementById('baked-data').textContent);
      function safeStorageGet(key) {
        try {
          return window.localStorage.getItem(key);
        } catch (_error) {
          return null;
        }
      }

      function safeStorageSet(key, value) {
        try {
          window.localStorage.setItem(key, value);
        } catch (_error) {
        }
      }
      const state = { authors: [], worksByAuthor: new Map(), genresById: new Map(), expandedAuthorId: null, dataLoaded: false };

    function normalize(value) { return String(value || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase(); }
    function escapeHtml(value) { return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;'); }
    function populateSelect(select, items, valueKey, labelKey) { for (const item of items) { const option = document.createElement('option'); option.value = item[valueKey]; option.textContent = item[labelKey]; select.appendChild(option); } }
    function matchesDateRange(value, from, to) { if (!value) return !from && !to; if (from && value < from) return false; if (to && value > to) return false; return true; }
    function getSimpleTerms() { return document.getElementById('simpleSearchInput').value.split(',').map((term) => normalize(term.trim())).filter(Boolean); }
    function getAdvancedFilters() { return { author: document.getElementById('author').value, genre: document.getElementById('genre').value, birthFrom: document.getElementById('birth_from').value, birthTo: document.getElementById('birth_to').value, deathFrom: document.getElementById('death_from').value, deathTo: document.getElementById('death_to').value }; }

    function filterData() {
      const advancedMode = document.getElementById('searchModeToggle').checked;
      const terms = getSimpleTerms();
      const filters = getAdvancedFilters();
      return state.authors.filter((author) => {
        const works = state.worksByAuthor.get(author.sz_id) || [];
        if (!advancedMode) {
          if (!terms.length) return true;
          const haystack = normalize([author.sz_neve, author.sz_szul_ido, author.sz_halala, author.sz_leiras].join(' '));
          return terms.some((term) => haystack.includes(term) || works.some((work) => normalize(`${work.mu_cim} ${work.me_leiras}`).includes(term)));
        }
        if (filters.author && String(author.sz_id) !== filters.author) return false;
        if (!matchesDateRange(author.sz_szul_ido, filters.birthFrom, filters.birthTo)) return false;
        if (!matchesDateRange(author.sz_halala, filters.deathFrom, filters.deathTo)) return false;
        return true;
      }).map((author) => {
        const works = state.worksByAuthor.get(author.sz_id) || [];
        if (!advancedMode) {
          if (!terms.length) return { author, works };
          const matchingWorks = works.filter((work) => terms.some((term) => normalize(`${work.mu_cim} ${work.me_leiras}`).includes(term)));
          return { author, works: matchingWorks, allWorks: works };
        }
        const filteredWorks = filters.genre ? works.filter((work) => String(work.mufaj_id) === filters.genre) : works;
        return { author, works: filteredWorks };
      });
    }

    function attachAuthorRowHandlers() { document.querySelectorAll('.author-row').forEach((row) => { row.addEventListener('click', () => { const authorId = Number(row.getAttribute('data-author-id')); state.expandedAuthorId = state.expandedAuthorId === authorId ? null : authorId; renderResults(); }); }); }
    function renderResults() {
      const tbody = document.getElementById('resultsBody');
      const rows = filterData();
      if (!rows.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nincs találat!</td></tr>'; return; }
      tbody.innerHTML = rows.map(({ author, works, allWorks }) => {
        const originalWorks = allWorks || works;
        const isExpanded = state.expandedAuthorId === author.sz_id;
        const worksHtml = works.length ? `
          <table class="table table-sm works-table"><thead><tr><th class="text-center">Mű Cím</th><th class="text-center">Műfaj</th><th class="text-center">Keletkezés Dátuma</th><th class="text-center">Mű Leírása</th></tr></thead><tbody>
            ${works.map((work) => `
              <tr>
                <td>${work.mu_link ? `<a href="${escapeHtml(work.mu_link)}" target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-outline-primary">${escapeHtml(work.mu_cim)}</a>` : escapeHtml(work.mu_cim)}</td>
                <td>${escapeHtml(work.mufaj)}</td>
                <td>${escapeHtml(work.mu_kelt)}</td>
                <td>${escapeHtml(work.me_leiras)}</td>
              </tr>`).join('')}
          </tbody></table>` : `<p class="text-muted text-center py-3">${originalWorks.length ? 'Nincs a szűrésnek megfelelő mű ehhez a szerzőhöz.' : 'Nincs mű hozzárendelve ehhez a szerzőhöz.'}</p>`;
        return `
          <tr class="author-row ${isExpanded ? 'expanded' : ''}" data-author-id="${author.sz_id}"><td><span class="expand-icon">▶</span></td><td>${escapeHtml(author.sz_neve)}</td><td>${escapeHtml(author.sz_szul_ido)}</td><td>${escapeHtml(author.sz_halala)}</td><td>${escapeHtml(author.sz_leiras)}</td><td>${author.sz_kep ? `<img src="${escapeHtml(author.sz_kep)}" alt="Szerző képe" class="img-thumbnail">` : ''}</td></tr>
          <tr class="works-container ${isExpanded ? 'show' : ''}" id="works-${author.sz_id}"><td colspan="6" class="works-cell p-0"><div class="p-3">${worksHtml}</div></td></tr>`;
      }).join('');
      attachAuthorRowHandlers();
    }

      function applySearchMode() { const advancedMode = document.getElementById('searchModeToggle').checked; document.getElementById('simpleSearch').style.display = advancedMode ? 'none' : 'block'; document.getElementById('advancedSearch').style.display = advancedMode ? 'block' : 'none'; safeStorageSet('searchModeStatic', advancedMode ? 'advanced' : 'simple'); state.expandedAuthorId = null; renderResults(); }
    function loadData() {
      const payload = bakedData;
      const authors = payload['szerzők'] || [];
      const genres = payload['műfajok'] || [];
      const works = payload['művek'] || [];
      state.authors = authors;
      state.genresById = new Map(genres.map((genre) => [genre.mufaj_id, genre.mufaj]));
      state.worksByAuthor = new Map();
      for (const work of works) {
        const hydrated = { ...work, mufaj: state.genresById.get(work.mufaj_id) || '' };
        if (!state.worksByAuthor.has(work.sz_id)) state.worksByAuthor.set(work.sz_id, []);
        state.worksByAuthor.get(work.sz_id).push(hydrated);
      }
      populateSelect(document.getElementById('author'), authors, 'sz_id', 'sz_neve');
      populateSelect(document.getElementById('genre'), genres, 'mufaj_id', 'mufaj');
      state.dataLoaded = true;
      renderResults();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const html = document.documentElement;
      const darkModeToggle = document.getElementById('darkModeToggle');
      const searchModeToggle = document.getElementById('searchModeToggle');
      const simpleSearchInput = document.getElementById('simpleSearchInput');
      const advancedSearchForm = document.getElementById('advancedSearchForm');
      const resetAdvanced = document.getElementById('resetAdvanced');
        if (safeStorageGet('darkMode') === 'true') { document.body.classList.add('dark-mode'); html.setAttribute('data-bs-theme', 'dark'); darkModeToggle.checked = true; }
        const savedMode = safeStorageGet('searchModeStatic');
        searchModeToggle.checked = savedMode === 'advanced';
        darkModeToggle.addEventListener('change', function() { if (this.checked) { document.body.classList.add('dark-mode'); html.setAttribute('data-bs-theme', 'dark'); safeStorageSet('darkMode', 'true'); } else { document.body.classList.remove('dark-mode'); html.setAttribute('data-bs-theme', 'light'); safeStorageSet('darkMode', 'false'); } });
      searchModeToggle.addEventListener('change', applySearchMode);
      let searchTimeout;
      simpleSearchInput.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { state.expandedAuthorId = null; renderResults(); }, 200); });
      advancedSearchForm.addEventListener('submit', (event) => { event.preventDefault(); state.expandedAuthorId = null; renderResults(); });
      advancedSearchForm.addEventListener('change', () => { state.expandedAuthorId = null; renderResults(); });
      resetAdvanced.addEventListener('click', () => { advancedSearchForm.reset(); state.expandedAuthorId = null; renderResults(); });
      loadData();
      applySearchMode();
    });
  </script>
</body>
</html>
